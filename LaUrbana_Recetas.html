    function Timer({ seconds }) {
      const [remaining, setRemaining] = React.useState(seconds);
      const [running, setRunning] = React.useState(false);
      const [done, setDone] = React.useState(false);
      const ref = React.useRef(null);

      React.useEffect(() => {
        if (running && remaining > 0) {
          ref.current = setInterval(() => {
            setRemaining(r => {
              if (r <= 1) { clearInterval(ref.current); setRunning(false); setDone(true); return 0; }
              return r - 1;
            });
          }, 1000);
        }
        return () => clearInterval(ref.current);
      }, [running]);

      const reset = () => { setRemaining(seconds); setRunning(false); setDone(false); };
      const m = Math.floor(remaining / 60);
      const s = remaining % 60;
      const pct = (seconds - remaining) / seconds;
      const radius = 18;
      const circ = 2 * Math.PI * radius;

      return (
        <div style={{ display:"flex", alignItems:"center", gap:10, marginTop:10, padding:"8px 12px",
          background: done ? "#f0fdf4" : "#fffbeb", borderRadius:8,
          border: "1px solid " + (done ? "#bbf7d0" : "#fde68a") }}>
          <svg width="40" height="40" style={{ transform:"rotate(-90deg)", flexShrink:0 }}>
            <circle cx="20" cy="20" r={radius} fill="none" stroke="#e5e7eb" strokeWidth="4" />
            <circle cx="20" cy="20" r={radius} fill="none" stroke={done ? "#16a34a" : "#f59e0b"} strokeWidth="4"
              strokeDasharray={String(circ)} strokeDashoffset={String(circ * (1 - pct))}
              style={{ transition:"stroke-dashoffset 1s linear" }} />
          </svg>
          <div style={{ fontSize:17, fontWeight:"bold", color: done ? "#16a34a" : "#92400e", minWidth:44 }}>
            {done ? "OK" : m + ":" + String(s).padStart(2,"0")}
          </div>
          <div style={{ display:"flex", gap:6, alignItems:"center" }}>
            {!done && (
              <button onClick={() => setRunning(v => !v)}
                style={{ padding:"5px 14px", borderRadius:6, border:"none", cursor:"pointer", fontSize:13,
                  fontWeight:"bold", background: running ? "#ef4444" : "#f59e0b", color:"white" }}>
                {running ? "Parar" : "Iniciar"}
              </button>
            )}
            {(done || remaining < seconds) && (
              <button onClick={reset} style={{ padding:"5px 10px", borderRadius:6, border:"1px solid #d1d5db", cursor:"pointer", fontSize:13, background:"white" }}>
                Reset
              </button>
            )}
            {done && <span style={{ fontSize:13, color:"#16a34a", fontWeight:"bold" }}>¡Listo!</span>}
          </div>
        </div>
      );
    }

    function RecipeCard({ recipe }) {

          <div style={{ padding:"14px 20px" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
              <div style={{ fontSize:12, color:"#6b7280", fontWeight:"bold" }}>{doneSteps.size}/{recipe.steps.length} pasos</div>
              {doneSteps.size > 0 && (
                <button onClick={() => { setDoneSteps(new Set()); setActiveStep(0); }}
                  style={{ fontSize:11, color:"#9ca3af", border:"none", background:"none", cursor:"pointer" }}>
                  Reiniciar
                </button>
              )}
            </div>
            <div style={{ height:5, background:"#e5e7eb", borderRadius:3, marginBottom:14 }}>
              <div style={{ height:"100%", borderRadius:3, background:recipe.color,
                width: ((doneSteps.size / recipe.steps.length) * 100) + "%", transition:"width 0.4s" }} />
            </div>

            {recipe.steps.map((step, i) => {
              const isActive = activeStep === i;
              const isDone = doneSteps.has(i);
              return (
                <div key={i} style={{ marginBottom:8, borderRadius:10, overflow:"hidden",
                  border:"1px solid " + (isActive ? recipe.color : (isDone ? "#bbf7d0" : "#e5e7eb")),
                  background: isDone ? "#f0fdf4" : (isActive ? recipe.color + "08" : "white") }}>
                  <div style={{ display:"flex", alignItems:"center", gap:10, padding:"10px 14px", cursor:"pointer" }}
                    onClick={() => setActiveStep(isActive ? null : i)}>
                    <div style={{ width:28, height:28, borderRadius:"50%", display:"flex", alignItems:"center",
                      justifyContent:"center", flexShrink:0,
                      background: isDone ? "#16a34a" : (isActive ? recipe.color : "#e5e7eb"),
                      color: (isDone || isActive) ? "white" : "#6b7280", fontWeight:"bold", fontSize:13 }}>
                      {isDone ? "✓" : i + 1}
                    </div>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:14, fontWeight:"bold", color: isDone ? "#16a34a" : "#111827" }}>{step.title}</div>
                      {step.duration > 0 && (
                        <div style={{ fontSize:12, color:"#6b7280" }}>
                          {Math.floor(step.duration / 60)} min{step.duration % 60 > 0 ? " " + (step.duration % 60) + " seg" : ""}
                        </div>
                      )}
                    </div>
                    <span style={{ color:"#9ca3af", fontSize:12 }}>{isActive ? "▲" : "▼"}</span>
                  </div>

                  {isActive && (
                    <div style={{ padding:"0 14px 14px" }}>
                      {step.alert && (
                        <div style={{ background:"#fff7ed", border:"1px solid #fed7aa", borderRadius:7,
                          padding:"8px 12px", marginBottom:10, fontSize:13, color:"#c2410c", fontWeight:"600" }}>
                          ⚠️ {step.alert}
                        </div>
                      )}
                      <div style={{ fontSize:14, color:"#374151", lineHeight:1.65, marginBottom:8 }}>{step.text}</div>
                      {step.duration > 0 && <Timer seconds={step.duration} />}
                      {!isDone && (
                        <button onClick={() => markDone(i)}
                          style={{ marginTop:12, padding:"9px 20px", borderRadius:8, border:"none",
                            cursor:"pointer", fontSize:14, fontWeight:"bold",
                            background:recipe.color, color:"white", width:"100%" }}>
                          ✓ Paso completado
                        </button>
                      )}
                    </div>
                  )}
                </div>
              );
            })}

            {doneSteps.size === recipe.steps.length && (
              <div style={{ textAlign:"center", padding:"14px", background:"#f0fdf4", borderRadius:10,
                color:"#16a34a", fontWeight:"bold", fontSize:16, marginTop:4 }}>
                🎉 ¡Receta completada!
              </div>
            )}
          </div>
        </div>
      );
    }

    function App() {
      const [selected, setSelected] = React.useState(null);
      return (
        <div style={{ fontFamily:"Arial, sans-serif", maxWidth:480, margin:"0 auto", padding:16, background:"#f3f4f6", minHeight:"100vh" }}>
          <div style={{ textAlign:"center", marginBottom:20, paddingTop:8 }}>
            <div style={{ fontSize:30 }}>🧑‍🍳</div>
            <div style={{ fontSize:20, fontWeight:"bold", color:"#111827" }}>La Urbana — Recetas</div>
            <div style={{ fontSize:13, color:"#6b7280", marginTop:2 }}>Temporizadores · Cantidades exactas · Paso a paso</div>
          </div>

          {selected === null ? (
            <div>
              {RECIPES.map(r => (
                <button key={r.id} onClick={() => setSelected(r.id)}
                  style={{ width:"100%", marginBottom:10, padding:"14px 18px", borderRadius:12, border:"none",
                    cursor:"pointer", background:"white", boxShadow:"0 1px 4px rgba(0,0,0,0.08)",
                    display:"flex", alignItems:"center", gap:14, textAlign:"left" }}>
                  <div style={{ width:44, height:44, borderRadius:10, background:r.color,
                    display:"flex", alignItems:"center", justifyContent:"center", fontSize:22, flexShrink:0 }}>
                    {r.emoji}
                  </div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontWeight:"bold", fontSize:15, color:"#111827" }}>{r.title}</div>
                    <div style={{ fontSize:12, color:"#6b7280", marginTop:2 }}>{r.subtitle}</div>
                  </div>
                  <span style={{ color:"#9ca3af", fontSize:18 }}>›</span>
                </button>
              ))}
            </div>
          ) : (
            <div>
              <button onClick={() => setSelected(null)}
                style={{ marginBottom:14, padding:"7px 16px", borderRadius:8, border:"1px solid #e5e7eb",
                  background:"white", cursor:"pointer", fontSize:13, color:"#374151" }}>
                ← Todas las recetas
              </button>
              <RecipeCard recipe={RECIPES.find(r => r.id === selected)} />
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
